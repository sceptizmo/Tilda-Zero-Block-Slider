<!--
  Tilda Zero Block Slider — готовый блок для вставки в HTML-блок Тильды.

  Шаги:
  1) Назначьте класс uc-review-slide всем блокам, которые должны стать слайдами.
  2) Назначьте классы элементов управления:
     - uc-review-prev — кнопка «назад»
     - uc-review-next — кнопка «вперёд»
  Элементы управления могут быть в отдельном zero-блоке до слайдов.
  или внутри самих слайдов (любой кликабельный элемент).

  Сайт: https://github.com/sceptizmo/Tilda-Zero-Block-Slider
-->
  <style>
    /* ОБЁРТКА ДЛЯ СТАБИЛЬНОЙ ВЁРСТКИ (БЕЗ СКАЧКОВ) */
    .uc-review-slider {
      position: relative;
      width: 100%;
      overflow: hidden;
    }
  
    /* ПОЗИЦИОНИРОВАНИЕ СЛАЙДОВ */
    .uc-review-slide {
      position: absolute;
      left: 0; right: 0; top: 0;
      opacity: 0;
      pointer-events: none;
      transform: translateX(0);
      transition: opacity 1s cubic-bezier(.22,.61,.36,1), transform 1s cubic-bezier(.22,.61,.36,1);
    }
  
    .uc-review-slide.is-active {
      opacity: 1;
      pointer-events: auto;
    }
  
    /* СОСТОЯНИЯ ВХОДА АНИМАЦИИ */
    .uc-review-slide.is-enter-from-right {
      transform: translateX(18%);
      opacity: 0;
    }
    .uc-review-slide.is-enter-from-left {
      transform: translateX(-18%);
      opacity: 0;
    }
  </style>
  
  <script>
  (function () {
    // При необходимости меняйте только эти классы.
    var SLIDE_SEL = ".uc-review-slide";
    var PREV_SEL  = ".uc-review-prev";
    var NEXT_SEL  = ".uc-review-next";
  
    function init() {
      var slides = Array.prototype.slice.call(document.querySelectorAll(SLIDE_SEL));
      if (!slides.length) return;
  
      var prevButtons = Array.prototype.slice.call(document.querySelectorAll(PREV_SEL));
      var nextButtons = Array.prototype.slice.call(document.querySelectorAll(NEXT_SEL));
  
      // Создаём обёртку один раз: все слайды внутри стабильного контейнера.
      var first = slides[0];
      var parent = first.parentNode;
  
      // Если обёртка уже есть (перепубликация), используем её.
      var existingWrapper = parent.querySelector(".uc-review-slider");
      var wrapper = existingWrapper || document.createElement("div");
      wrapper.className = "uc-review-slider";
  
      if (!existingWrapper) {
        parent.insertBefore(wrapper, first);
        slides.forEach(function (s) {
          wrapper.appendChild(s);
        });
      } else {
        // Обновляем список слайдов из обёртки (надёжнее).
        slides = Array.prototype.slice.call(wrapper.querySelectorAll(SLIDE_SEL));
      }
  
      var currentIndex = 0;
      var isAnimating = false;
  
      // Длительность должна совпадать с CSS-анимацией (мс).
      var ANIM_MS = 1000;
  
      /* -----------------------------
         УПРАВЛЕНИЕ ВЫСОТОЙ
      ------------------------------ */
      function setWrapperHeight(index, animate) {
        var h = slides[index].offsetHeight || 0;
        if (!h) return;
  
        if (animate) wrapper.style.transition = "height 0.25s ease";
        else wrapper.style.transition = "none";
  
        wrapper.style.height = h + "px";
      }
  
      /* -----------------------------
         ОСТАНОВКА МЕДИА
      ------------------------------ */
    function stopHtml5Videos(scopeEl, skipEl) {
      (scopeEl || wrapper).querySelectorAll("video").forEach(function (v) {
        if (skipEl && v === skipEl) return;
        try { v.pause(); } catch(e) {}
        // Если нужно перематывать в начало:
        // try { v.currentTime = 0; } catch(e) {}
      });
    }
  
    function stopYouTubeIframes(scopeEl, skipEl) {
      var iframes = (scopeEl || wrapper).querySelectorAll('iframe[src*="youtube.com/embed"]');
        iframes.forEach(function (f) {
        if (skipEl && f === skipEl) return;
          try {
            if (!f.contentWindow) return;
  
            // Отправляем на YouTube origin (надёжнее, чем "*").
            var msgStop  = JSON.stringify({ event: "command", func: "stopVideo", args: "" });
            var msgPause = JSON.stringify({ event: "command", func: "pauseVideo", args: "" });
  
            f.contentWindow.postMessage(msgStop,  "https://www.youtube.com");
            f.contentWindow.postMessage(msgPause, "https://www.youtube.com");
  
            // Иногда нужен второй сигнал (задержка готовности плеера).
            setTimeout(function () {
              try {
                f.contentWindow && f.contentWindow.postMessage(msgStop,  "https://www.youtube.com");
                f.contentWindow && f.contentWindow.postMessage(msgPause, "https://www.youtube.com");
              } catch(e) {}
            }, 120);
  
          } catch(e) {}
        });
      }
  
      // Жёсткий фолбэк: сброс src (гарантированно останавливает, но перезагружает iframe).
    function hardResetYouTubeIframes(scopeEl, skipEl) {
      var iframes = (scopeEl || wrapper).querySelectorAll('iframe[src*="youtube.com/embed"]');
        iframes.forEach(function (f) {
        if (skipEl && f === skipEl) return;
          try {
            var src = f.getAttribute("src") || f.getAttribute("data-original");
            if (!src) return;
            // Сбрасываем src на текущее значение.
            f.setAttribute("src", src);
          } catch(e) {}
        });
      }
  
    function stopVimeoIframes(scopeEl, skipEl) {
      var iframes = (scopeEl || wrapper).querySelectorAll('iframe[src*="player.vimeo.com"]');
        iframes.forEach(function (f) {
        if (skipEl && f === skipEl) return;
          try {
            if (!f.contentWindow) return;
            f.contentWindow.postMessage(
              JSON.stringify({ method: "pause" }),
              "*"
            );
          } catch(e) {}
        });
      }
  
    function stopAllMediaIn(scopeEl) {
      stopHtml5Videos(scopeEl);
      stopYouTubeIframes(scopeEl);
      stopVimeoIframes(scopeEl);
    }

    function stopAllMediaOnPage(skipEl) {
      // Останавливаем всё на странице, кроме запускаемого медиа.
      stopHtml5Videos(document, skipEl);
      stopYouTubeIframes(document, skipEl);
      stopVimeoIframes(document, skipEl);
  
        // ДОП. ФОЛБЭК: раскомментируйте, если postMessage игнорируется.
      // setTimeout(function(){ hardResetYouTubeIframes(document, skipEl); }, 160);
      }
  
      /* -----------------------------
         ОТРИСОВКА
      ------------------------------ */
      function showInitial() {
        slides.forEach(function (s, i) {
          s.classList.toggle("is-active", i === currentIndex);
          s.classList.remove("is-enter-from-right", "is-enter-from-left");
        });
  
        requestAnimationFrame(function () {
          setWrapperHeight(currentIndex, false);
        });
      }
  
      function showSlide(nextIndex, direction) {
        if (isAnimating || nextIndex === currentIndex) return;
  
        // Останавливаем медиа перед переключением.
        stopAllMediaIn(wrapper);
  
        isAnimating = true;
  
        var current = slides[currentIndex];
        var next = slides[nextIndex];
  
        // Подготавливаем состояние входа следующего слайда.
        next.classList.remove("is-enter-from-right", "is-enter-from-left");
        if (direction === "next") next.classList.add("is-enter-from-right");
        else next.classList.add("is-enter-from-left");
  
        // Делаем следующий слайд видимым (ещё со смещением).
        next.classList.add("is-active");
  
        // Выравниваем высоту обёртки под следующий слайд.
        setWrapperHeight(nextIndex, true);
  
        // Запускаем входную анимацию.
        requestAnimationFrame(function () {
          next.classList.remove("is-enter-from-right", "is-enter-from-left");
        });
  
        // ВАЖНО: мгновенно скрываем текущий (без «выхода», чтобы не было скачка).
        current.classList.remove("is-active");
  
        setTimeout(function () {
          currentIndex = nextIndex;
          isAnimating = false;
        }, ANIM_MS);
      }
  
      function goNext() {
        showSlide((currentIndex + 1) % slides.length, "next");
      }
      function goPrev() {
        showSlide((currentIndex - 1 + slides.length) % slides.length, "prev");
      }
  
      /* -----------------------------
         КЛИКИ (МОЖНО НЕСКОЛЬКО КНОПОК)
      ------------------------------ */
      nextButtons.forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          goNext();
        });
      });
  
      prevButtons.forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          goPrev();
        });
      });

      /* -----------------------------
         ОСТАНОВКА ДРУГИХ МЕДИА ПРИ ВОСПРОИЗВЕДЕНИИ
      ------------------------------ */
      document.addEventListener("play", function (e) {
        var t = e.target;
        if (!t || t.tagName !== "VIDEO") return;
        if (!wrapper.contains(t)) return;
        stopAllMediaOnPage(t);
      }, true);

      function onSliderPointer(e) {
        var iframe = e.target && e.target.closest ? e.target.closest("iframe") : null;
        if (!iframe) return;
        if (!wrapper.contains(iframe)) return;
        stopAllMediaOnPage(iframe);
      }

      wrapper.addEventListener("pointerdown", onSliderPointer, true);
      wrapper.addEventListener("click", onSliderPointer, true);
  
      /* -----------------------------
         СВАЙП (МОБИЛЬНЫЕ И ПЛАНШЕТЫ)
         По умолчанию включено для <= 960px.
      ------------------------------ */
      var SWIPE_MAX_WIDTH = 960;
      var startX = 0, startY = 0, isDown = false, startTime = 0;
  
      function isSwipeEnabled() {
        return window.innerWidth <= SWIPE_MAX_WIDTH;
      }
  
      wrapper.addEventListener("touchstart", function (e) {
        if (!isSwipeEnabled()) return;
        if (!e.touches || e.touches.length !== 1) return;
  
        isDown = true;
        startTime = Date.now();
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
      }, { passive: true });
  
      wrapper.addEventListener("touchend", function (e) {
        if (!isSwipeEnabled()) return;
        if (!isDown) return;
        isDown = false;
  
        var touch = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : null;
        if (!touch) return;
  
        var dx = touch.clientX - startX;
        var dy = touch.clientY - startY;
        var dt = Date.now() - startTime;
  
        // Пороги.
        var MIN_DIST = 40;      // px.
        var MAX_TIME = 600;     // ms.
        var MAX_Y = 80;         // px (не даём вертикальному скроллу срабатывать как свайп).
  
        if (Math.abs(dy) > MAX_Y) return;
        if (dt > MAX_TIME) return;
        if (Math.abs(dx) < MIN_DIST) return;
  
        if (dx < 0) goNext();
        else goPrev();
      }, { passive: true });
  
      /* -----------------------------
         РЕСАЙЗ: ПОДДЕРЖИВАЕМ КОРРЕКТНУЮ ВЫСОТУ
      ------------------------------ */
      window.addEventListener("resize", function () {
        setWrapperHeight(currentIndex, false);
      });
  
      showInitial();
    }
  
    // Тильда иногда вставляет блоки после DOMContentLoaded; пробуем несколько раз.
    var tries = 0;
    (function tryInit() {
      tries++;
      init();
      if (document.querySelectorAll(SLIDE_SEL).length === 0 && tries < 20) {
        setTimeout(tryInit, 200);
      }
    })();
  })();
  </script>
